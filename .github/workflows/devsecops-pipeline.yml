name: DevSecOps - SAST & DAST

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast:
    name: SAST - SonarQube
    runs-on: [self-hosted, linux, x64, sonar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug konektivitas SonarQube
        run: |
          echo "=== Cek SONAR_HOST_URL ==="
          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "ERROR: SONAR_HOST_URL secret kosong"
            exit 1
          fi

          echo "=== Test HTTP API SonarQube ==="
          curl -v --max-time 15 "${{ secrets.SONAR_HOST_URL }}/api/system/status"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}