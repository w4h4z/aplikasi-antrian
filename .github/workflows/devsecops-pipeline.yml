name: DevSecOps - SAST & DAST

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast:
    name: SAST - SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug konektivitas SonarQube
        run: |
          echo "=== Cek SONAR_HOST_URL ada atau tidak ==="
          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "ERROR: SONAR_HOST_URL secret kosong"
            exit 1
          fi
          echo "Host URL ter-set"

          echo "=== Test TCP ke server ==="
          timeout 10 bash -c 'cat < /dev/tcp/172.237.74.42/9000' \
            && echo "✓ Port reachable" \
            || (echo "✗ Port BLOCKED — gunakan self-hosted runner" && exit 1)

          echo "=== Test HTTP API ==="
          curl -sf --max-time 10 "${{ secrets.SONAR_HOST_URL }}/api/system/status" \
            && echo "✓ SonarQube responsif" \
            || (echo "✗ SonarQube tidak respon" && exit 1)

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}