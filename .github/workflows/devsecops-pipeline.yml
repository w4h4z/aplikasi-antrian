name: DevSecOps - SAST & DAST

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast:
    name: SAST - SonarQube
    runs-on: [self-hosted, linux, x64, sonar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug SonarQube Connection
        run: |
          echo "=== Check SONAR_HOST_URL ==="
          if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "ERROR: SONAR_HOST_URL secret is empty"
            exit 1
          fi

          echo "=== Test SonarQube API ==="
          curl -sf --max-time 15 "${{ secrets.SONAR_HOST_URL }}/api/system/status"
          echo ""

      - name: SonarQube Scan with Quality Gate
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  dast:
    name: DAST - OWASP ZAP
    runs-on: [self-hosted, linux, x64, sonar]
    needs: sast

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: antrian
      DB_USER: xecura
      DB_PASS: ${{ secrets.DB_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Runtime
        run: |
          echo "=== PHP Version ==="
          php -v

          echo "=== MySQL Version ==="
          mysql --version

          echo "=== Docker Version ==="
          docker --version

      - name: Check Database Connection
        run: |
          echo "=== Test MariaDB connection ==="

          if [ -z "$DB_PASS" ]; then
            echo "ERROR: DB_PASS secret is empty"
            exit 1
          fi

          MYSQL_PWD="$DB_PASS" mysql \
            -h "$DB_HOST" \
            -u "$DB_USER" \
            "$DB_NAME" \
            -e "SELECT DATABASE();"

      - name: Prepare Test Data
        run: |
          echo "=== Prepare tickets table ==="

          MYSQL_PWD="$DB_PASS" mysql \
            -h "$DB_HOST" \
            -u "$DB_USER" \
            "$DB_NAME" <<'SQL'
          CREATE TABLE IF NOT EXISTS tickets (
            id INT PRIMARY KEY AUTO_INCREMENT,
            nama VARCHAR(100) NOT NULL
          );

          INSERT INTO tickets (nama)
          SELECT 'Budi'
          WHERE NOT EXISTS (SELECT 1 FROM tickets WHERE nama = 'Budi');

          INSERT INTO tickets (nama)
          SELECT 'Siti'
          WHERE NOT EXISTS (SELECT 1 FROM tickets WHERE nama = 'Siti');

          INSERT INTO tickets (nama)
          SELECT 'Andi'
          WHERE NOT EXISTS (SELECT 1 FROM tickets WHERE nama = 'Andi');

          SELECT * FROM tickets;
          SQL

      - name: Start PHP Built-in Server
        run: |
          echo "=== Start PHP server ==="

          nohup php -S 0.0.0.0:8080 -t . > php_server.log 2>&1 &
          echo $! > php_server.pid

          sleep 5

          echo "=== Test root page ==="
          curl -v --max-time 15 http://127.0.0.1:8080/ || {
            echo "=== PHP server log ==="
            cat php_server.log
            exit 1
          }

          echo "=== Test vulnerable page ==="
          curl -v --max-time 15 "http://127.0.0.1:8080/?id=1" || {
            echo "=== PHP server log ==="
            cat php_server.log
            exit 1
          }

      - name: Prepare ZAP Output Directory
        run: |
          echo "=== Prepare ZAP output directory ==="

          rm -rf zap-output
          mkdir -p zap-output
          chmod 777 zap-output

          if [ -f .zap/rules.tsv ]; then
            cp .zap/rules.tsv zap-output/rules.tsv
          else
            touch zap-output/rules.tsv
          fi

          chmod 666 zap-output/rules.tsv

      - name: OWASP ZAP Full Scan
        run: |
          echo "=== Run OWASP ZAP Full Scan ==="

          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/zap-output:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t "http://127.0.0.1:8080/?id=1" \
            -r zap_report.html \
            -J zap_report.json \
            -w zap_report.md \
            -a || true

      - name: Stop PHP Built-in Server
        if: always()
        run: |
          echo "=== Stop PHP server ==="

          if [ -f php_server.pid ]; then
            kill "$(cat php_server.pid)" || true
          fi

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-output/zap_report.html
            zap-output/zap_report.json
            zap-output/zap_report.md
            php_server.log
          retention-days: 14